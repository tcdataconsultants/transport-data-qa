{% extends "base.html" %}

{% block title %}Upload Dataset - Transport Data QA{% endblock %}

{% block content %}

<div class="row mb-4">
    <div class="col">
        <h1 class="h3 mb-1">Upload Dataset</h1>
        <p class="text-muted mb-0">
            Upload NaPTAN, BODS, timetable or supporting transport data files.
        </p>
    </div>
</div>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="dataset_file" class="form-label">Dataset file</label>
                <input class="form-control" type="file" id="dataset_file" name="dataset_file">
                <div class="form-text">
                    Supported formats: CSV, Excel, ZIP and XML.
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Upload dataset</button>
        </form>
    </div>
</div>

{% endblock %}
